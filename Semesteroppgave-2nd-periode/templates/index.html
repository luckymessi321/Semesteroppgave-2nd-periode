{% extends "base.html" %}

{% block title %} Solid Snake Game {% endblock %}
{% block content %}

<!--displayer highscore og bruker-->

<h2>User: {{username}}</h2>
<h2>Highscore: {{ highscore }} (please refresh the page in order to update highscore)</h2>
<!-- legger til en knapp for å starte spillet-->
<button id="start">start/restart</button>
<!-- legger til score i h2 -->
<h2>Score <span id="score">0</span></h2>
<div class="grid"></div>
<script src="/static/script/script.js" defer></script>
{% endblock %}
